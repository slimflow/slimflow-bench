upstream backend {
    least_conn;
    server node1:8081 max_fails=1 fail_timeout=1s;
    server node2:8082 max_fails=1 fail_timeout=1s;
    server node3:8083 max_fails=1 fail_timeout=1s;
}

server {
    listen 8080;

    location / {
        proxy_pass http://backend;
        proxy_next_upstream error timeout http_503;
        proxy_next_upstream_tries 2;
        proxy_connect_timeout 1s;
        proxy_read_timeout 5s;
    }
}
